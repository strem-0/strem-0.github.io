<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل البث المباشر</title>
    <style>
        /* إعدادات الخطوط والألوان العامة */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* خلفية داكنة مريحة للعين */
            color: #f8fafc;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* الحاوية الرئيسية للمشغل */
        .container {
            width: 100%;
            max-width: 900px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* تصميم بطاقة المشغل الحديثة */
        .player-card {
            background-color: #1e293b;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 1px solid #334155;
        }

        /* ترويسة المشغل */
        .player-header {
            padding: 15px 20px;
            background: linear-gradient(135deg, #1e1b4b, #311042);
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-badge {
            background-color: #ef4444;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            animation: blink 1.5s infinite;
        }

        .player-title {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }

        /* حاوية الفيديو لجعل الـ iframe متجاوباً تلقائياً */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* نسبة أبعاد 16:9 شاشات العرض الحديثة */
            height: 0;
            overflow: hidden;
            background-color: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* تأثير وميض لزر الـ LIVE */
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="player-card">
            <!-- ترويسة المشغل -->
            <div class="player-header">
                <span class="live-badge">مباشر LIVE</span>
                <h1 class="player-title">قناة البث الرئيسية</h1>
            </div>
            
            <!-- حاوية المشغل المتجاوبة -->
            <div class="video-wrapper">
                <iframe 
                    src="https://live.bb6.dpdns.org/albaplayer/ch1/?serv=0" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen="true" 
                    id="streamFrame">
                </iframe>
            </div>
        </div>
    </div>

</body>
</html>
